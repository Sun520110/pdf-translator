name: Build Tauri App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        run: |
          if [ -f "src-tauri/target/release/bundle/nsis/"*.exe ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe ./
          elif [ -f "src-tauri/target/release/"*.exe ]; then
            cp src-tauri/target/release/*.exe ./
          fi
          if [ -f "src-tauri/target/release/bundle/msi/"*.msi ]; then
            cp src-tauri/target/release/bundle/msi/*.msi ./
          fi
          ls -la *.exe *.msi 2>/dev/null || echo "No installers found"
        shell: bash

      - name: Upload Windows Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.exe
            *.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        run: |
          if [ -f "src-tauri/target/release/bundle/appimage/"*.AppImage ]; then
            cp src-tauri/target/release/bundle/appimage/*.AppImage ./
          fi
          ls -la *.AppImage 2>/dev/null || echo "No AppImage found"
        shell: bash

      - name: Upload Linux Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
