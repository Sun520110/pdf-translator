name: Build Tauri App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        shell: bash
        run: |
          echo "=== Build outputs ==="
          find src-tauri/target/release -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dll" \) 2>/dev/null | head -30
          echo "=== Bundle folder ==="
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null | head -50

      - name: Upload all executables
        uses: actions/upload-artifact@v4
        with:
          name: pdf-translator-windows
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        shell: bash
        run: |
          echo "=== Build outputs ==="
          find src-tauri/target/release -type f \( -name "*.AppImage" -o -name "pdf-translator" \) 2>/dev/null | head -30
          echo "=== Bundle folder ==="
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null | head -50

      - name: Upload all executables
        uses: actions/upload-artifact@v4
        with:
          name: pdf-translator-linux
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/pdf-translator
            src-tauri/target/release/*.AppImage
